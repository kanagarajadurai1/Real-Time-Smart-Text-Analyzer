<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Text Analyzer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>Smart Text Analyzer</h2>

<textarea id="text" placeholder="Type your message here..."></textarea>

<div class="progress">
<div id="progressBar"></div>
</div>

<div class="stats">

<p>Characters: <span id="charCount">0</span>/200</p>
<p>Remaining: <span id="remaining">200</span></p>
<p>Words: <span id="wordCount">0</span></p>
<p>Sentences: <span id="sentenceCount">0</span></p>

</div>

<p id="warning"></p>

<div class="buttons">
<button id="copy">Copy</button>
<button id="clear">Clear</button>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
